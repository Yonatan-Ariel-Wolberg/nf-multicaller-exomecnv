version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            pip install pytest numpy pandas scikit-learn xgboost imbalanced-learn pysam
      - run:
          name: Run Python tests
          command: python -m pytest -q

workflows:
  run-tests:
    jobs:
      - test
