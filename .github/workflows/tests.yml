name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas scikit-learn xgboost imbalanced-learn pysam

      - name: Run Python tests
        run: pytest tests/ -v

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Check Nextflow syntax
        run: nextflow run main.nf --help

      - name: Check bash scripts
        run: |
          for f in bin/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            bash -n "$f"
          done

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Check R scripts
        run: |
          for f in bin/*.R; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            Rscript --vanilla -e "source('$f')" 2>&1 || true
          done
