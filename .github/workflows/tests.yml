name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas scikit-learn xgboost imbalanced-learn pysam

      - name: Run Python tests
        run: python -m pytest -q

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Check Nextflow syntax
        run: nextflow run main.nf --help -with-docker false -with-singularity false -with-apptainer false

      - name: Check bash scripts
        run: |
          for f in bin/*; do
            [ -f "$f" ] || continue
            if head -n 1 "$f" | grep -Eq '^#!/(usr/bin/env )?bash'; then
              echo "Checking $f..."
              bash -n "$f"
            fi
          done

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Parse R scripts
        run: |
          for f in bin/*.R; do
            [ -f "$f" ] || continue
            echo "Parsing $f..."
            Rscript --vanilla -e "parse(file='$f')"
          done
